name: Pre-Release

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
    branches:
      - main
      - main-sbx
      - main-dev2
      - main-prd
env:
  REGISTRY: docker.io
  REPOSITORY_OWNER: ${{ secrets.DOCKERHUB_USERNAME }}

permissions:
  contents: write
  packages: write
  pull-requests: write
  attestations: write
  id-token: write

concurrency:
  # Only cancel jobs for PR updates
  group: pre-${{ github.ref }}
  cancel-in-progress: true

jobs:

  generate-version:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.out.outputs.version }}

    steps:
      - uses: actions/checkout@v2

      - name: Determine branch prefix
        id: branch
        run: |
          BRANCH_NAME="${GITHUB_BASE_REF}"
          case "$BRANCH_NAME" in
            main-sbx)
              echo "prefix=sbx_" >> $GITHUB_OUTPUT
              ;;
            main-dev2)
              echo "prefix=dev2_" >> $GITHUB_OUTPUT
              ;;
            main-prd)
              echo "prefix=prd_" >> $GITHUB_OUTPUT
              ;;
            main)
              echo "prefix=" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "prefix=${BRANCH_NAME}_" >> $GITHUB_OUTPUT
              ;;
          esac

      - id: bump
        uses: zwaldowski/match-label-action@v1
        with:
          allowed: major,minor,patch

      - name: Find latest tag with prefix
        id: latest_tag
        run: |
          PREFIX="${{ steps.branch.outputs.prefix }}"
          git fetch --tags
          if [ -z "$PREFIX" ]; then
            # No prefix - find latest tag without prefix (exclude pre-release and prefixed tags)
            LATEST_TAG=$(git tag -l --sort=-v:refname | grep -v "_" | grep -v "PRE" | head -n 1)
          else
            # Find latest tag with this prefix (exclude pre-release tags)
            LATEST_TAG=$(git tag -l --sort=-v:refname "${PREFIX}*" | grep -v "PRE" | head -n 1)
          fi

          if [ -z "$LATEST_TAG" ]; then
            # No existing tag, start with 0.0.0
            echo "version=0.0.0" >> $GITHUB_OUTPUT
          else
            # Remove prefix to get version number
            VERSION=${LATEST_TAG#"$PREFIX"}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi
          echo "Latest tag found: $LATEST_TAG (version: ${VERSION:-0.0.0})"

      - name: Bump version
        id: bump_version
        run: |
          VERSION="${{ steps.latest_tag.outputs.version }}"
          BUMP="${{ steps.bump.outputs.match }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          if [[ "$BUMP" == "major" ]]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [[ "$BUMP" == "minor" ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            # Default to patch if no label or patch label
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped version: $VERSION -> $NEW_VERSION"

      - name: Get PR Number
        id: pr_number
        run: echo "nr=$(echo $GITHUB_REF | awk 'BEGIN { FS = "/" } ; { print $3 }')" >> $GITHUB_OUTPUT

      - name: Set version output
        id: out
        run: echo "version=${{ steps.branch.outputs.prefix }}${{ steps.bump_version.outputs.version }}-PRE-${{ steps.pr_number.outputs.nr }}" >> $GITHUB_OUTPUT

  # image build&push
  tmforum-apis:
    needs: [ "generate-version" ]
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Update Specs
        uses: ./.github/actions/get-spec
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v2
        with:
          distribution: 'zulu'
          java-version: '17'
          java-package: jdk

      - name: Log into Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build&Push image (tests disabled)
        run: |
          REPO_LOWER=$(echo "${{ env.REPOSITORY_OWNER }}" | tr '[:upper:]' '[:lower:]')
          mvn versions:set -DnewVersion=${{ needs.generate-version.outputs.version }}
          mvn clean install deploy -DskipITs -DskipTests -Poci -Dimage.tag=${{ needs.generate-version.outputs.version }} -Dimage.registry="${{ env.REGISTRY }}" -Dimage.repository="${REPO_LOWER}"

  git-release:
    needs: ["generate-version","tmforum-apis"]
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v2

      - uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: ${{ needs.generate-version.outputs.version }}
          prerelease: true
          title: ${{ needs.generate-version.outputs.version }}
          files: |
            LICENSE