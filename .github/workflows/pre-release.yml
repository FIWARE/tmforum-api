name: Pre-Release

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
    branches:
      - main
      - main-sbx
      - main-dev2
      - main-prd
env:
  REGISTRY: ghcr.io
  REPOSITORY_OWNER: ${{ github.repository_owner }}

permissions:
  contents: write
  packages: write
  pull-requests: write
  attestations: write
  id-token: write

concurrency:
  # Only cancel jobs for PR updates
  group: pre-${{ github.ref }}
  cancel-in-progress: true

jobs:

  generate-version:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.out.outputs.version }}

    steps:
      - uses: actions/checkout@v2

      - name: Determine branch prefix
        id: branch
        run: |
          BRANCH_NAME="${GITHUB_BASE_REF}"
          case "$BRANCH_NAME" in
            main-sbx)
              echo "::set-output name=prefix::sbx_"
              ;;
            main-dev2)
              echo "::set-output name=prefix::dev2_"
              ;;
            main-prd)
              echo "::set-output name=prefix::prd_"
              ;;
            main)
              echo "::set-output name=prefix::"
              ;;
            *)
              echo "::set-output name=prefix::${BRANCH_NAME}_"
              ;;
          esac

      - id: bump
        uses: zwaldowski/match-label-action@v1
        with:
          allowed: major,minor,patch

      - uses: zwaldowski/semver-release-action@v2
        with:
          dry_run: true
          bump: ${{ steps.bump.outputs.match }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prefix: ${{ steps.branch.outputs.prefix }}

      - name: Get PR Number
        id: pr_number
        run: echo "::set-output name=nr::$(echo $GITHUB_REF | awk 'BEGIN { FS = "/" } ; { print $3 }')"

      - name: Set version output
        id: out
        run: echo "::set-output name=version::$(echo ${{ steps.branch.outputs.prefix }}${VERSION}-PRE-${{ steps.pr_number.outputs.nr }})"

  # image build&push
  tmforum-apis:
    needs: [ "generate-version" ]
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Update Specs
        uses: ./.github/actions/get-spec
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v2
        with:
          distribution: 'zulu'
          java-version: '17'
          java-package: jdk

      - name: Log into GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build&Push image (tests disabled)
        run: |
          REPO_LOWER=$(echo "${{ env.REPOSITORY_OWNER }}" | tr '[:upper:]' '[:lower:]')
          mvn versions:set -DnewVersion=${{ needs.generate-version.outputs.version }}
          mvn clean install deploy -DskipTests -DskipITs -Dmaven.test.skip=true -Poci -Dimage.tag=${{ needs.generate-version.outputs.version }} -Dimage.registry="${{ env.REGISTRY }}" -Dimage.repository="${REPO_LOWER}"

  git-release:
    needs: ["generate-version","tmforum-apis"]
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v2

      - uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: ${{ needs.generate-version.outputs.version }}
          prerelease: true
          title: ${{ needs.generate-version.outputs.version }}
          files: |
            LICENSE