name: Release

on:
  push:
    branches:
      - main
      - main-sbx
      - main-dev2
      - main-prd

env:
  REGISTRY: docker.io
  REPOSITORY_OWNER: ${{ secrets.DOCKERHUB_USERNAME }}

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

jobs:
  generate-version:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.out.outputs.version }}

    steps:
      - uses: actions/checkout@v2

      - name: Determine branch prefix
        id: branch
        run: |
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          case "$BRANCH_NAME" in
            main-sbx)
              echo "prefix=sbx_" >> $GITHUB_OUTPUT
              ;;
            main-dev2)
              echo "prefix=dev2_" >> $GITHUB_OUTPUT
              ;;
            main-prd)
              echo "prefix=prd_" >> $GITHUB_OUTPUT
              ;;
            main)
              echo "prefix=" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "prefix=${BRANCH_NAME}_" >> $GITHUB_OUTPUT
              ;;
          esac

      - id: pr
        uses: actions-ecosystem/action-get-merged-pull-request@v1.0.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find latest tag with prefix
        id: latest_tag
        run: |
          PREFIX="${{ steps.branch.outputs.prefix }}"
          git fetch --tags
          if [ -z "$PREFIX" ]; then
            # No prefix - find latest tag without prefix (exclude pre-release and prefixed tags)
            LATEST_TAG=$(git tag -l --sort=-v:refname | grep -v "_" | grep -v "PRE" | head -n 1)
          else
            # Find latest tag with this prefix (exclude pre-release tags)
            LATEST_TAG=$(git tag -l --sort=-v:refname "${PREFIX}*" | grep -v "PRE" | head -n 1)
          fi

          if [ -z "$LATEST_TAG" ]; then
            # No existing tag, start with 0.0.0
            echo "version=0.0.0" >> $GITHUB_OUTPUT
          else
            # Remove prefix to get version number
            VERSION=${LATEST_TAG#"$PREFIX"}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi
          echo "Latest tag found: $LATEST_TAG (version: ${VERSION:-0.0.0})"

      - name: Bump version
        id: bump
        run: |
          VERSION="${{ steps.latest_tag.outputs.version }}"
          LABELS="${{ steps.pr.outputs.labels }}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          if [[ "$LABELS" == *"major"* ]]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif [[ "$LABELS" == *"minor"* ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            # Default to patch if no label or patch label
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped version: $VERSION -> $NEW_VERSION"

      - name: Set version output
        id: out
        run: echo "version=${{ steps.branch.outputs.prefix }}${{ steps.bump.outputs.version }}" >> $GITHUB_OUTPUT

  # image build&push
  tmforum-apis:
    needs: [ "generate-version" ]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-java@v2
        with:
          distribution: 'zulu'
          java-version: '17'
          java-package: jdk


      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build&Push image
        run: |
          REPO_LOWER=$(echo "${{ env.REPOSITORY_OWNER }}" | tr '[:upper:]' '[:lower:]')
          mvn versions:set -DnewVersion=${{ needs.generate-version.outputs.version }}
          mvn clean install deploy -Poci -DskipTests -DskipITs -Dimage.tag=${{ needs.generate-version.outputs.version }} -Dimage.registry="${{ env.REGISTRY }}" -Dimage.repository="${REPO_LOWER}"

  git-release:
    needs: ["generate-version", "tmforum-apis"]

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v2

      - uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: ${{ needs.generate-version.outputs.version }}
          prerelease: false
          title: ${{ needs.generate-version.outputs.version }}
          files: |
            LICENSE
